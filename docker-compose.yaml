services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./Frontend:/usr/share/nginx/html:ro

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    ports:
      - "8081:8080"
    volumes:
      - ./api-document.yaml:/usr/share/nginx/html/openapi.yaml:ro
    environment:
      URL: /openapi.yaml

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-TodoApp}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      # 初回起動時のみ実行（ボリュームが空のとき）。スキーマは Backend/db/init/ddl.sql
      - ./Backend/db/init:/docker-entrypoint-initdb.d:ro

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis

volumes:
  db-data:
    driver: local
